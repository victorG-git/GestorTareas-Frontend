<!-- tareas-list.component.html -->

@if (tareaService.cargando()) {

    <div class="text-center py-4">

        <div class="spinner-border text-primary" role="status">

            <span class="visually-hidden">
                Cargando...
            </span>

        </div>

    </div>

}

@if (tareaService.error()) {

    <div class="alert alert-danger">

        {{ tareaService.error() }}

    </div>

}

@if (!tareaService.cargando() && !tareaService.error()) {

    @for (tarea of tareaService.tareas(); track tarea.id) {

        <app-tarea-card
            [tarea]="tarea"
            (completar)="onCompletar($event)"
            (eliminar)="onEliminar($event)">
        </app-tarea-card>

    } @empty {

        <p class="text-muted text-center py-4">

            No hay tareas

        </p>

    }

}
